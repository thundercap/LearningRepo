name: Build, Scan & Deploy React App to Azure Container Instance

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
  NODE_VERSION: '18'

jobs:
  # ------------------------------
  # 1. Build Job
  # ------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-image-tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm ci

      - name: Run Unit Tests
        run: npm test -- --coverage

      - name: Upload Test Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Set Docker Image Tag (Git SHA)
        id: set-image-tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker Image (Multi-stage)
        run: docker build -t $IMAGE_NAME:${{ steps.set-image-tag.outputs.tag }} .

  # ------------------------------
  # 2. Scan Job
  # ------------------------------
  scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ------------------
      # SonarQube SAST
      # ------------------
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ------------------
      # Grype SCA
      # ------------------
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Run Grype Scan
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin
          mkdir -p grype-reports
          grype $IMAGE_NAME:${{ needs.build.outputs.image-tag }} -o json > grype-reports/scan-report.json || true
          grype $IMAGE_NAME:${{ needs.build.outputs.image-tag }} -o table > grype-reports/scan-report.txt || true

      - name: Upload Grype Reports
        uses: actions/upload-artifact@v4
        with:
          name: grype-scan-reports
          path: grype-reports/
          retention-days: 30

      - name: Enforce Grype Policy
        run: |
          HIGH_COUNT=$(jq '[.matches[] | select(.vulnerability.severity=="High" or .vulnerability.severity=="Critical")] | length' grype-reports/scan-report.json)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Found $HIGH_COUNT High/Critical vulnerabilities. Failing build."
            exit 1
          fi

      # ------------------
      # OWASP ZAP DAST (Staging URL)
      # ------------------
      - name: Install OWASP ZAP
        run: sudo apt-get update && sudo apt-get install -y zaproxy

      - name: Run DAST Scan
        env:
          TARGET_URL: "http://${{ secrets.ACI_DNS_LABEL }}.azurecontainer.io"
        run: |
          mkdir -p dast-reports
          zap-cli quick-scan --self-contained -r dast-reports/dast-report.html $TARGET_URL

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: dast-reports/
          retention-days: 30

      - name: Fail on High/Critical DAST Findings
        env:
          TARGET_URL: "http://${{ secrets.ACI_DNS_LABEL }}.azurecontainer.io"
        run: |
          HIGH=$(zap-cli alerts $TARGET_URL --level High | wc -l)
          CRITICAL=$(zap-cli alerts $TARGET_URL --level Critical | wc -l)
          if [ "$HIGH" -gt 0 ] || [ "$CRITICAL" -gt 0 ]; then
            echo "High or Critical DAST vulnerabilities found"
            exit 1
          fi

  # ------------------------------
  # 3. Deploy to Staging
  # ------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy Docker Image to Staging
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
          ACI_DNS_LABEL: ${{ secrets.ACI_DNS_LABEL }}
        run: |
          az container delete --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ secrets.AZURE_CONTAINER_NAME }} --yes || true
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --image $IMAGE_NAME:$IMAGE_TAG \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label $ACI_DNS_LABEL \
            --environment-variables NODE_ENV=staging

      - name: Run E2E Tests
        run: npm run cypress:run || exit 1

  # ------------------------------
  # 4. Deploy to Production
  # ------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
      # URL cannot use secrets, leave blank or use static URL
    steps:
      - name: Manual Approval Gate
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy Docker Image to Production
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
          ACI_DNS_LABEL: ${{ secrets.ACI_DNS_LABEL }}
        run: |
          az container delete --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ secrets.AZURE_CONTAINER_NAME }} --yes || true
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --image $IMAGE_NAME:$IMAGE_TAG \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label $ACI_DNS_LABEL \
            --environment-variables NODE_ENV=production
