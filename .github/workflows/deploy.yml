name: Build, Scan & Deploy React App to Azure Container Instance

on:
  push:
    branches:
      - main   # or your deploy branch

jobs:
  build-scan-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Node (optional but useful for frontend builds or SonarQube scans)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies (needed for SonarQube analysis)
      - name: Install Dependencies
        run: |
          npm ci

      # Run SonarQube SAST Scan
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.TEGITHUB_TOKEN }}  # Needed for PR decoration
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # (Optional) Quality Gate check — ensures code meets SonarQube standards before deployment
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/react-app
          docker build -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

      # Log in to Azure
      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      # Delete existing ACI (if any)
      - name: Delete existing ACI (if any)
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --yes || true

      # Deploy to Azure Container Instance
      - name: Deploy to ACI
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --image ${{ secrets.DOCKER_USERNAME }}/react-app:latest \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label ${{ secrets.ACI_DNS_LABEL }} \
            --environment-variables NODE_ENV=production
