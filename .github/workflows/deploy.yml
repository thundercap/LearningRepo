name: Build, Scan & Deploy React App to Azure Container Instance

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
  NODE_VERSION: '18'

jobs:
  # ------------------------------
  # 1. Build and Push Image
  # ------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.set-image-tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Clean and Install Dependencies
        run: |
          rm -rf node_modules
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Unit Tests with Coverage
        run: npm test -- --coverage --detectOpenHandles

      - name: Upload Test Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Set Docker Image Tag (Git SHA)
        id: set-image-tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.set-image-tag.outputs.tag }}

  # ------------------------------
  # 2. SAST + SCA (SonarQube + Grype)
  # ------------------------------
  scan-sast-sca:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Docker Hub Login (for image pull by scanners)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Grype Scan (image from registry)
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          mkdir -p grype-reports
          grype ${{ env.IMAGE_NAME }}:${IMAGE_TAG} -o json > grype-reports/scan-report.json || true
          grype ${{ env.IMAGE_NAME }}:${IMAGE_TAG} -o table > grype-reports/scan-report.txt || true

      - name: Upload Grype Reports
        uses: actions/upload-artifact@v4
        with:
          name: grype-scan-reports
          path: grype-reports/
          retention-days: 30

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Enforce Grype Policy
        run: |
          HIGH_COUNT=$(jq '[.matches[] | select(.vulnerability.severity=="High" or .vulnerability.severity=="Critical")] | length' grype-reports/scan-report.json)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Found $HIGH_COUNT High/Critical vulnerabilities. Failing build."
            exit 1
          fi

  # ------------------------------
  # 3. Deploy to Staging
  # ------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    needs: scan-sast-sca
    outputs:
      staging-url: ${{ steps.set-staging-url.outputs.url }}
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy Docker Image to Staging
        id: deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
          ACI_DNS_LABEL: ${{ secrets.ACI_DNS_LABEL_STAGING || secrets.ACI_DNS_LABEL }}
        run: |
          az container delete --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ secrets.AZURE_CONTAINER_NAME }} --yes || true
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --image $IMAGE_NAME:$IMAGE_TAG \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label $ACI_DNS_LABEL \
            --environment-variables NODE_ENV=staging
          echo "staging_url=http://$ACI_DNS_LABEL.azurecontainer.io" >> $GITHUB_OUTPUT

      - name: Set staging URL output
        id: set-staging-url
        run: echo "url=http://${{ secrets.ACI_DNS_LABEL_STAGING || secrets.ACI_DNS_LABEL }}.azurecontainer.io" >> $GITHUB_OUTPUT

  # ------------------------------
  # 4. E2E Tests (run after staging is up)
  # ------------------------------
  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Cypress E2E Tests
        env:
          TARGET_URL: ${{ needs.deploy-staging.outputs.staging-url }}
        run: |
          echo "Running Cypress against $TARGET_URL"
          npm run cypress:run -- --config baseUrl=$TARGET_URL

  # ------------------------------
  # 5. DAST (OWASP ZAP) — runs after staging is live
  # ------------------------------
  dast-scan:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: ${{ needs.deploy-staging.outputs.staging-url }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: .zap/
          retention-days: 30

  # ------------------------------
  # 6. Deploy to Production (manual approval enforced via environment protection)
  # ------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: [dast-scan, e2e-tests]
    environment:
      name: production
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: Deploy Docker Image to Production
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
          ACI_DNS_LABEL: ${{ secrets.ACI_DNS_LABEL_PRODUCTION || secrets.ACI_DNS_LABEL }}
        run: |
          az container delete --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --name ${{ secrets.AZURE_CONTAINER_NAME_PROD || secrets.AZURE_CONTAINER_NAME }} --yes || true
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME_PROD || secrets.AZURE_CONTAINER_NAME }} \
            --image $IMAGE_NAME:$IMAGE_TAG \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label $ACI_DNS_LABEL \
            --environment-variables NODE_ENV=production
