name: Build, Scan & Deploy React App to Azure Container Instance

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
  NODE_VERSION: '18'

jobs:
  # ------------------------------
  # 1. Build and Push Image
  # ------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image-tag: ${{ steps.set-image-tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        # FIX: Use 'npm ci' instead of 'npm install' for deterministic, lockfile-enforced installs in CI.
        # If your lockfile is out of sync, fix it locally with 'npm install' and commit the updated lockfile.
        run: npm ci

      - name: Run Unit Tests with Coverage
        run: npm test -- --coverage --detectOpenHandles

      - name: Upload Test Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Set Docker Image Tag (Git SHA)
        id: set-image-tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        # FIX: Upgraded docker/login-action from v2 → v3
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        # FIX: Upgraded docker/build-push-action from v4 → v5
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.set-image-tag.outputs.tag }}

  # ------------------------------
  # 2. SAST + SCA (SonarQube + Grype)
  # ------------------------------
  scan-sast-sca:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Login to Docker Hub
        # FIX: Upgraded docker/login-action from v2 → v3
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Grype Scan (image from registry)
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
        run: |
          mkdir -p grype-reports
          # FIX: Removed '|| true' from the JSON report line so real failures (missing image,
          # network error, etc.) are not silently swallowed and the policy check below is reliable.
          # '|| true' is kept ONLY on the human-readable table output which is non-blocking.
          grype ${{ env.IMAGE_NAME }}:${IMAGE_TAG} -o json > grype-reports/scan-report.json
          grype ${{ env.IMAGE_NAME }}:${IMAGE_TAG} -o table > grype-reports/scan-report.txt || true

      - name: Upload Grype Reports
        uses: actions/upload-artifact@v4
        with:
          name: grype-scan-reports
          path: grype-reports/
          retention-days: 30

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Enforce Grype Policy
        run: |
          HIGH_COUNT=$(jq '[.matches[] | select(.vulnerability.severity=="High" or .vulnerability.severity=="Critical")] | length' grype-reports/scan-report.json)
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "Found $HIGH_COUNT High/Critical vulnerabilities. Failing build."
            exit 1
          fi
          echo "No High/Critical vulnerabilities found."

  # ------------------------------
  # 3. Deploy to Staging
  # ------------------------------
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [scan-sast-sca, build]
    outputs:
      staging-url: ${{ steps.set-staging-url.outputs.url }}
    steps:
      - name: Azure Login
        # FIX: Upgraded azure/login from v1 → v2 and switched to individual secret
        # parameters to avoid JSON injection issues when secret values contain special characters.
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Docker Image to Staging
        id: deploy
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
          ACI_DNS_LABEL: ${{ secrets.ACI_DNS_LABEL_STAGING || secrets.ACI_DNS_LABEL }}
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --yes || true

          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --image $IMAGE_NAME:$IMAGE_TAG \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label $ACI_DNS_LABEL \
            --environment-variables NODE_ENV=staging

      - name: Set Staging URL Output
        # FIX: Removed the duplicate/dead 'staging_url' output from the deploy step above.
        # A single, clearly named output is set here and referenced consistently downstream.
        id: set-staging-url
        run: echo "url=http://${{ secrets.ACI_DNS_LABEL_STAGING || secrets.ACI_DNS_LABEL }}.azurecontainer.io" >> $GITHUB_OUTPUT

      - name: Wait for Staging to Become Healthy
        # FIX: Added a readiness poll so E2E and DAST jobs don't start hitting the app
        # while the container is still initialising (which causes false test failures).
        run: |
          STAGING_URL=${{ steps.set-staging-url.outputs.url }}
          echo "Waiting for $STAGING_URL to become available..."
          for i in {1..18}; do
            if curl -sf --max-time 5 "$STAGING_URL" > /dev/null 2>&1; then
              echo "Staging is healthy after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/18 — retrying in 10s..."
            sleep 10
          done
          echo "Staging did not become healthy within 3 minutes. Failing."
          exit 1

  # ------------------------------
  # 4. E2E Tests (run after staging is up)
  # ------------------------------
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        # FIX: Use 'npm ci' for deterministic installs
        run: npm ci

      - name: Run Cypress E2E Tests
        env:
          TARGET_URL: ${{ needs.deploy-staging.outputs.staging-url }}
        run: |
          echo "Running Cypress against $TARGET_URL"
          npm run cypress:run -- --config baseUrl=$TARGET_URL

  # ------------------------------
  # 5. DAST (OWASP ZAP) — runs after staging is live
  # ------------------------------
  dast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy-staging
    steps:
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: ${{ needs.deploy-staging.outputs.staging-url }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        with:
          name: dast-report
          path: .zap/
          # FIX: Added explicit retention period to match the rest of the pipeline's artifacts
          retention-days: 30

  # ------------------------------
  # 6. Deploy to Production (manual approval enforced via environment protection)
  # ------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # FIX: Added 'build' to needs so needs.build.outputs.image-tag resolves correctly.
    # Without this, the image tag expression returns empty and deploys nothing (or the wrong image).
    needs: [dast-scan, e2e-tests, build]
    environment:
      name: production
    steps:
      - name: Azure Login
        # FIX: Upgraded azure/login from v1 → v2 with individual secret parameters
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Docker Image to Production
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/react-app
          ACI_DNS_LABEL: ${{ secrets.ACI_DNS_LABEL_PRODUCTION || secrets.ACI_DNS_LABEL }}
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME_PROD || secrets.AZURE_CONTAINER_NAME }} \
            --yes || true

          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME_PROD || secrets.AZURE_CONTAINER_NAME }} \
            --image $IMAGE_NAME:$IMAGE_TAG \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label $ACI_DNS_LABEL \
            --environment-variables NODE_ENV=production
