name: Build, Scan & Deploy React App to Azure Container Instance

on:
  push:
    branches:
      - main   # or your deploy branch

jobs:
  build-scan-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Run SonarQube Scan (SAST)
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Enforce Quality Gate
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Docker Hub login
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/react-app
          docker build -t $IMAGE_NAME:latest .

      # Run Grype Image Scan and Save Report
      - name: Run Grype Scan
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/react-app:latest
          echo "Running Grype vulnerability scan..."
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin
          mkdir -p grype-reports
          grype $IMAGE_NAME:latest -o json > grype-reports/scan-report.json || true
          grype $IMAGE_NAME:latest -o table > grype-reports/scan-report.txt || true

      # Upload Grype Report as Artifact
      - name: Upload Grype Scan Reports
        uses: actions/upload-artifact@v3
        with:
          name: grype-scan-reports
          path: grype-reports/
          retention-days: 30   # Keep for 30 days (adjust as needed)

      # Fail if critical vulnerabilities are found
      - name: Enforce Vulnerability Policy
        run: |
          CRITICAL_COUNT=$(jq '[.matches[] | select(.vulnerability.severity=="Critical")] | length' grype-reports/scan-report.json)
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Found $CRITICAL_COUNT Critical vulnerabilities. Failing build."
            exit 1
          else
            echo "No critical vulnerabilities found."
          fi

      # Push Docker Image (only if scan passes)
      - name: Push Docker Image
        if: success()
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/react-app
          docker push $IMAGE_NAME:latest

      # Azure Login
      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      # Delete existing container (if any)
      - name: Delete existing ACI (if any)
        run: |
          az container delete \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --yes || true

      # Deploy to Azure Container Instance
      - name: Deploy to Azure Container Instance
        run: |
          az container create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_CONTAINER_NAME }} \
            --image ${{ secrets.DOCKER_USERNAME }}/react-app:latest \
            --cpu 1 --memory 1 \
            --registry-login-server docker.io \
            --registry-username ${{ secrets.DOCKER_USERNAME }} \
            --registry-password ${{ secrets.DOCKER_PASSWORD }} \
            --ports 80 \
            --restart-policy Always \
            --os-type Linux \
            --ip-address Public \
            --dns-name-label ${{ secrets.ACI_DNS_LABEL }} \
            --environment-variables NODE_ENV=production
